<div class="container fade-in">
  <header class="projects-header">
    <h1>Mis Proyectos</h1>
    <p>Una selección de mis trabajos más recientes y experiencias técnicas.</p>
  </header>

  <section id="github-projects">
    <div class="section-title">
      <i class="fab fa-github"></i>
      <h2>Proyectos en GitHub</h2>
    </div>

    <div class="projects-grid">
      <article class="project-card" *ngFor="let p of proyectosGithub">
        <div class="card-tags-container">
          <div class="card-tag" *ngFor="let tech of p.tecnologias">
            {{tech}}
          </div>
        </div>

        <h3>{{p.titulo}}</h3>
        <p>{{p.descripcion}}</p>

        <a [href]="p.url_repositorio" target="_blank" class="github-link">
          Ver Repositorio <span>&rarr;</span>
        </a>
      </article>
    </div>
  </section>

  <hr class="separator" />

  <section id="other-work">
    <div class="section-title">
      <h2>Otras Experiencias</h2>
    </div>
    <ul class="list-group">
      <li class="list-item" *ngFor="let exp of otrasExperiencias">
        <div class="item-dot"></div>
        <div class="item-content">
          <h4>{{exp.titulo}}</h4>
          <p>{{exp.descripcion}}</p>
        </div>
      </li>
    </ul>
  </section>
</div>
